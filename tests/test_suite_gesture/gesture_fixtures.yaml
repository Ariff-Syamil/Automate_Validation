# tests/test_suite_gesture/gesture_fixtures.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Data-driven fixtures for gesture acceptance tests.
#
# Consumed by: tests/test_suite_gesture/testcase_gesture.py
#
# Keep test-only knobs HERE, not in configs/gui/gui_configuration.yaml.
# Runtime config (configs/gui/...) drives the live app; this file drives only
# the offline video-based acceptance suite.
#
# All paths are resolved relative to the repository root.
# ─────────────────────────────────────────────────────────────────────────────

# ── DETECTOR_SETTINGS BEGIN ──
# Mirror of backend.gesture_worker.GestureWorker MediaPipe settings.
# If GestureWorker's defaults change, update these to match so the test
# verifies the same detector that ships in production.
detector:
  model_path: models/hand_landmarker.task
  num_hands: 2
  min_hand_detection_confidence: 0.7
  min_hand_presence_confidence: 0.7
  min_tracking_confidence: 0.5
  infer_width: 320          # downscale frames before inference
# ── DETECTOR_SETTINGS END ──

# ── SCENARIOS BEGIN ──
# Each scenario is one test case. The test is considered PASSED when every
# entry in `must_observe` has been seen at least once before the video ends.
# Duplicates are ignored; ordering does not matter.
scenarios:
  - id: left_hand_motor_selection
    description: "Left hand: 1–5 extended fingers must select motors 1, 2, 3, 4 and ALL"
    video: gui/assets/LeftHand_GestureVideo.mp4
    hand: Left                                # "Left" | "Right"
    kind: motor_selection                     # how to evaluate frames (see test code)
    must_observe: ["1", "2", "3", "4", "ALL"]

  - id: right_hand_speed_stop
    description: "Right hand: pinch <50%, pinch >50%, and fist stop must all appear"
    video: gui/assets/RightHand_GestureVideo.mp4
    hand: Right
    kind: speed_and_stop                      # pinch + fist evaluation
    pinch_split: 0.5                          # speed boundary between low/high
    must_observe: ["speed_below_50", "speed_above_50", "stop"]
# ── SCENARIOS END ──
