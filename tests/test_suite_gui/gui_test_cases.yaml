  # ──────────────────────────────────────────────────────────────────────────
  # TRANSPORT CONTROLS — PLAY / STOP / RESET  TC-GUI-020 – TC-GUI-023
  # ──────────────────────────────────────────────────────────────────────────

  - test_case_id: TC-GUI-020
    owner: null
    component: Transport Controls
    dependency:
      - TC-GUI-010
    precondition: >
      Base panel is active; mock_data.enabled: true in gui_configuration.yaml;
      system is in READY (stopped) state.
    test_name: Play button starts the system; KPI shows RUNNING; mock timer fires
    steps:
      - "Click the Play button in the LeftRail transport row"
      - "Wait 600 ms for at least one mock-data timer tick (tick interval: 500 ms)"
      - "Read the KPI strip status label"
      - "Read at least one motor card RPM gauge value"
    expected_result: >
      base_start_clicked signal emits; KPI status text becomes 'RUNNING';
      at least one motor RPM gauge shows a non-zero value from mock data;
      base_gesture_enabled is True (gesture pipeline started).
    fail_conditions: >
      KPI remains 'READY'; motor gauges stay at zero after 600 ms;
      gesture is not enabled.
    priority: P0
    severity: Critical
    automation_readiness: Automatable
    automation_status: Ready
    test_environment_ci_hil: CI
    observations: >
      BasePanelPresenter._handle_start() sets motors 'running', starts gesture,
      sets base_gesture_enabled=True, starts mock timer.
    jira_link: null
    next_action_if_fail: >
      Check presenter _handle_start; verify mock data timer QTimer is created
      and started with correct interval.

  - test_case_id: TC-GUI-021
    owner: null
    component: Transport Controls
    dependency:
      - TC-GUI-020
    precondition: "System is in RUNNING state (Play was clicked)."
    test_name: Stop button stops the system; KPI shows READY; gesture disabled
    steps:
      - "Click the Stop button in the LeftRail transport row"
      - "Read the KPI strip status label"
      - "Verify base_gesture_enabled on the bridge"
    expected_result: >
      base_stop_clicked signal emits; KPI status becomes 'READY';
      base_gesture_enabled is False; mock timer stops.
    fail_conditions: >
      KPI remains 'RUNNING'; gesture stays enabled; mock timer keeps ticking.
    priority: P0
    severity: Critical
    automation_readiness: Automatable
    automation_status: Ready
    test_environment_ci_hil: CI
    observations: >
      BasePanelPresenter._handle_stop() stops gesture, clears base_gesture_enabled,
      stops mock timer.
    jira_link: null
    next_action_if_fail: "Inspect _handle_stop; check gesture controller stop path."

  - test_case_id: TC-GUI-022
    owner: null
    component: Transport Controls
    dependency:
      - TC-GUI-021
    precondition: "System is in READY (stopped) state."
    test_name: Play → Stop → Play round-trip restores RUNNING state correctly
    steps:
      - "Click Play; verify RUNNING"
      - "Click Stop; verify READY"
      - "Click Play again; verify RUNNING"
      - "Wait 600 ms; verify mock motor RPM is non-zero again"
    expected_result: >
      System transitions READY → RUNNING → READY → RUNNING without error;
      mock RPM is non-zero on second start.
    fail_conditions: >
      Second Play fails to start; RPM stays zero; application error after second start.
    priority: P1
    severity: Major
    automation_readiness: Automatable
    automation_status: Ready
    test_environment_ci_hil: CI
    observations: "Tests that presenter does not hold stale state from first stop."
    jira_link: null
    next_action_if_fail: >
      Check if gesture controller re-initializes correctly after stop;
      verify QTimer.start() is idempotent.

  - test_case_id: TC-GUI-023
    owner: null
    component: Transport Controls
    dependency:
      - TC-GUI-020
    precondition: "System is in RUNNING state."
    test_name: Reset clears motor gauges and stops the mock timer
    steps:
      - "Click the Reset button in the LeftRail transport row"
      - "Verify KPI status reverts to READY"
      - "Verify all motor card RPM gauges display 0"
      - "Wait 600 ms; verify gauges stay at 0 (timer stopped)"
    expected_result: >
      base_reset_clicked signal emits; all motor bridge data is zeroed via
      update_motor_data; KPI status is READY; no further mock ticks occur.
    fail_conditions: >
      Gauges are non-zero after reset; timer continues ticking; status stays RUNNING.
    priority: P1
    severity: Major
    automation_readiness: Automatable
    automation_status: Ready
    test_environment_ci_hil: CI
    observations: >
      BasePanelPresenter._handle_reset() calls update_motor_data with zeros for
      all nodes and motors, stops gesture, and stops mock timer.
    jira_link: null
    next_action_if_fail: "Verify _handle_reset loops all nodes/motors; check mock timer stop."

  # ──────────────────────────────────────────────────────────────────────────
  # BASE PANEL — KPI STRIP  TC-GUI-030 – TC-GUI-032
  # ──────────────────────────────────────────────────────────────────────────

  - test_case_id: TC-GUI-030
    owner: null
    component: Base Panel / KPI Strip
    dependency:
      - TC-GUI-001
    precondition: "Base panel visible; system has not been started."
    test_name: KPI strip renders READY status on initial load
    steps:
      - "Open Base panel"
      - "Read the KPI strip status field value"
    expected_result: >
      Status field shows 'READY'; totalRpm shows 0; fault count shows 0.
    fail_conditions: "Status shows RUNNING or empty; totalRpm is non-zero before Play."
    priority: P1
    severity: Major
    automation_readiness: Automatable
    automation_status: Ready
    test_environment_ci_hil: CI
    observations: "KpiStrip initial state is driven by base_transport_playing=false in QML."
    jira_link: null
    next_action_if_fail: "Check initial value of base_transport_playing binding in QML."

  - test_case_id: TC-GUI-031
    owner: null
    component: Base Panel / KPI Strip
    dependency:
      - TC-GUI-020
    precondition: "System is RUNNING; mock_data.enabled: true."
    test_name: KPI totalRpm aggregates live mock RPM values across all motor cards
    steps:
      - "Start the system (Play)"
      - "Wait 1000 ms for mock data to populate motor gauges"
      - "Sum the RPM values shown on all visible motor cards"
      - "Read totalRpm from the KPI strip"
    expected_result: >
      KPI totalRpm equals the sum of individual motor card RPM gauge values
      (within rounding tolerance of ±1 RPM).
    fail_conditions: "KPI totalRpm does not match sum of motor card values; shows 0."
    priority: P1
    severity: Major
    automation_readiness: Semi-Automatable
    automation_status: Ready
    test_environment_ci_hil: CI
    observations: >
      KpiStrip.totalRpm is computed from base_transport_playing and per-card values
      in QML, not the bridge directly.
    jira_link: null
    next_action_if_fail: >
      Inspect KpiStrip QML binding for totalRpm; verify motor card RPM
      properties are updated by bridge.base_update_motor().

  - test_case_id: TC-GUI-032
    owner: null
    component: Base Panel / KPI Strip
    dependency:
      - TC-GUI-020
    precondition: "System is RUNNING."
    test_name: Uptime counter in KPI strip increments while system is running
    steps:
      - "Click Play; note the uptime display value (should be near 0)"
      - "Wait 3 seconds"
      - "Read the uptime display value again"
    expected_result: "Uptime has increased by approximately 3 seconds."
    fail_conditions: "Uptime stays at 0 or does not change after 3 seconds."
    priority: P2
    severity: Minor
    automation_readiness: Automatable
    automation_status: Ready
    test_environment_ci_hil: CI
    observations: >
      Uptime timer is a local QML timer driven by base_transport_playing;
      timer starts on Play and stops on Stop/Reset.
    jira_link: null
    next_action_if_fail: "Check QML uptime timer binding to base_transport_playing."

