- test_case_id: TC-GUI-013
  owner: GUI Automation Team
  component: Navigation
  dependency:
  - TC-GUI-010
  precondition: Application is running; Base panel is currently active.
  test_name: Active Navigation Idempotence
  description: Verifies that Active Navigation Idempotence works as expected in the Navigation section.
    The test passes when the app stays on the Base page; the Base page remains active; no crash or visual
    flicker.
  steps:
  - Confirm Base panel is active (stack index 0)
  - Click the 'Base' nav pill again
  - Verify stack index remains 0 and no visual glitch occurs
  expected_result: 'Stack index stays 0; base_active_section remains ''base''; no crash or visual flicker.

    '
  fail_conditions: Application crashes or navigates to a different panel.
  priority: P2
  severity: Minor
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: '_on_nav always calls setCurrentIndex even if unchanged; this is safe but worth verifying
    no side effects trigger twice.

    '
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-215
  next_action_if_fail: Review _on_nav for guard logic.
- test_case_id: TC-GUI-020
  owner: GUI Automation Team
  component: Transport Controls
  dependency:
  - TC-GUI-010
  precondition: 'Base panel is active; mock_data.enabled: true in gui_configuration.yaml; system is in
    READY (stopped) state.

    '
  test_name: Play Starts System
  description: Verifies that Play Starts System works as expected in the Transport Controls section. The
    test passes when the Play button is accepted; the status display changes to 'RUNNING'; at least one
    motor RPM gauge shows a non-zero value from simulated data; gesture control is turned on (gesture
    pipeline started).
  steps:
  - Click the Play button in the LeftRail transport row
  - 'Wait 600 ms for at least one mock-data timer tick (tick interval: 500 ms)'
  - Read the KPI strip status label
  - Read at least one motor card RPM gauge value
  expected_result: 'base_start_clicked signal emits; KPI status text becomes ''RUNNING''; at least one
    motor RPM gauge shows a non-zero value from mock data; base_gesture_enabled is True (gesture pipeline
    started).

    '
  fail_conditions: 'KPI remains ''READY''; motor gauges stay at zero after 600 ms; gesture is not enabled.

    '
  priority: P0
  severity: Critical
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: 'BasePanelPresenter._handle_start() sets motors ''running'', starts gesture, sets base_gesture_enabled=True,
    starts mock timer.

    '
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-219
  next_action_if_fail: 'Check presenter _handle_start; verify mock data timer QTimer is created and started
    with correct interval.

    '
- test_case_id: TC-GUI-021
  owner: GUI Automation Team
  component: Transport Controls
  dependency:
  - TC-GUI-020
  precondition: System is in RUNNING state (Play was clicked).
  test_name: Stop Returns Ready
  description: Verifies that Stop Returns Ready works as expected in the Transport Controls section. The
    test passes when the Stop button is accepted; the status display changes to 'READY'; gesture control
    is turned off; simulated data stops updating.
  steps:
  - Click the Stop button in the LeftRail transport row
  - Read the KPI strip status label
  - Verify base_gesture_enabled on the bridge
  expected_result: 'base_stop_clicked signal emits; KPI status becomes ''READY''; base_gesture_enabled
    is False; mock timer stops.

    '
  fail_conditions: 'KPI remains ''RUNNING''; gesture stays enabled; mock timer keeps ticking.

    '
  priority: P0
  severity: Critical
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: 'BasePanelPresenter._handle_stop() stops gesture, clears base_gesture_enabled, stops mock
    timer.

    '
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-219
  next_action_if_fail: Inspect _handle_stop; check gesture controller stop path.
- test_case_id: TC-GUI-022
  owner: GUI Automation Team
  component: Transport Controls
  dependency:
  - TC-GUI-021
  precondition: System is in READY (stopped) state.
  test_name: Play Stop Play Round Trip
  description: Verifies that Play Stop Play Round Trip works as expected in the Transport Controls section.
    The test passes when system transitions READY → RUNNING → READY → RUNNING without error; mock RPM
    is non-zero on second start.
  steps:
  - Click Play; verify RUNNING
  - Click Stop; verify READY
  - Click Play again; verify RUNNING
  - Wait 600 ms; verify mock motor RPM is non-zero again
  expected_result: 'System transitions READY → RUNNING → READY → RUNNING without error; mock RPM is non-zero
    on second start.

    '
  fail_conditions: 'Second Play fails to start; RPM stays zero; application error after second start.

    '
  priority: P1
  severity: Major
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: Tests that presenter does not hold stale state from first stop.
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-219
  next_action_if_fail: 'Check if gesture controller re-initializes correctly after stop; verify QTimer.start()
    is idempotent.

    '
- test_case_id: TC-GUI-023
  owner: GUI Automation Team
  component: Transport Controls
  dependency:
  - TC-GUI-020
  precondition: System is in RUNNING state.
  test_name: Reset Clears Motor Gauges
  description: Verifies that Reset Clears Motor Gauges works as expected in the Transport Controls section.
    The test passes when the Reset button is accepted; all motor the app data is zeroed via update motor
    data; KPI status is READY; no further mock ticks occur.
  steps:
  - Click the Reset button in the LeftRail transport row
  - Verify KPI status reverts to READY
  - Verify all motor card RPM gauges display 0
  - Wait 600 ms; verify gauges stay at 0 (timer stopped)
  expected_result: 'base_reset_clicked signal emits; all motor bridge data is zeroed via update_motor_data;
    KPI status is READY; no further mock ticks occur.

    '
  fail_conditions: 'Gauges are non-zero after reset; timer continues ticking; status stays RUNNING.

    '
  priority: P1
  severity: Major
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: 'BasePanelPresenter._handle_reset() calls update_motor_data with zeros for all nodes and
    motors, stops gesture, and stops mock timer.

    '
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-219
  next_action_if_fail: Verify _handle_reset loops all nodes/motors; check mock timer stop.
