test_cases:
- test_case_id: TC-GUI-001
  owner: GUI Automation Team
  component: Application Window
  dependency: null
  precondition: 'gui_configuration.yaml is present at configs/gui/gui_configuration.yaml; PySide6 is installed;
    DISPLAY or virtual framebuffer available.

    '
  test_name: Configured App Launch
  description: 'Verifies that Configured App Launch works as expected in the Application Window section.
    The test passes when the window title matches the title set in the GUI configuration (default: "Automate5
    Industrial Control Hub").'
  steps:
  - Launch main.py (python main.py)
  - Wait for MainWindow to become visible
  - Read the window title bar text
  expected_result: 'Window title equals the value of window.title in gui_configuration.yaml (default:
    "Automate5 Industrial Control Hub").

    '
  fail_conditions: 'Window does not appear; title text is empty, ''Automate5'', or any value other than
    the one declared in gui_configuration.yaml.

    '
  priority: P0
  severity: Critical
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: 'main.py calls _load_window_cfg() and passes w.get(''title'') to window.setWindowTitle().
    Falls back to ''Automate5 Industrial Control Hub'' when the key is absent.

    '
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-215
  next_action_if_fail: 'Check configs/gui/gui_configuration.yaml for window.title key; confirm _load_window_cfg()
    is not raising an exception silently.

    '
- test_case_id: TC-GUI-002
  owner: GUI Automation Team
  component: Application Window
  dependency: null
  precondition: gui_configuration.yaml present; PySide6 installed.
  test_name: Configured Window Size
  description: Verifies that Configured Window Size works as expected in the Application Window section.
    The test passes when the window width matches the configured width (default 1920) and the window height
    matches the configured height (default 1080).
  steps:
  - Launch main.py
  - Capture the window geometry after it is shown
  - Compare width and height against window.width / window.height in YAML
  expected_result: 'window.width() == YAML window.width (default 1920) and window.height() == YAML window.height
    (default 1080).

    '
  fail_conditions: 'Window dimensions differ from YAML values by more than 2 pixels (excluding platform
    window chrome).

    '
  priority: P1
  severity: Major
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: 'main.py calls window.resize(int(w.get(''width'', 1920)), int(w.get(''height'', 1080))).
    Off-by-one is acceptable due to OS DPI scaling; >2 px difference is a defect.

    '
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-215
  next_action_if_fail: Inspect _load_window_cfg() return value; check YAML integer types.
- test_case_id: TC-GUI-003
  owner: GUI Automation Team
  component: Application Window
  dependency: null
  precondition: PySide6 installed; gui_configuration.yaml temporarily renamed or corrupted.
  test_name: Config Fallback Defaults
  description: Verifies that Config Fallback Defaults works as expected in the Application Window section.
    The test passes when application starts; window title is 'Automate5 Industrial Control Hub'; window
    is 1920x1080; the app starts without showing a startup error.
  steps:
  - Rename configs/gui/gui_configuration.yaml to gui_configuration.yaml.bak
  - Launch main.py
  - Verify application starts without an unhandled exception
  - Verify window title and size use hard-coded defaults
  - Restore gui_configuration.yaml.bak
  expected_result: 'Application starts; window title is ''Automate5 Industrial Control Hub''; window is
    1920x1080; no Python traceback is printed to stderr.

    '
  fail_conditions: 'Application raises an unhandled exception at startup; or window does not appear.

    '
  priority: P1
  severity: Major
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: '_load_window_cfg() wraps yaml.safe_load in try/except and returns {} on any exception,
    so defaults apply silently.

    '
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-215
  next_action_if_fail: Trace _load_window_cfg() exception path in main.py.
- test_case_id: TC-GUI-010
  owner: GUI Automation Team
  component: Navigation
  dependency:
  - TC-GUI-001
  precondition: Application is running; Base panel is initially visible.
  test_name: Base Panel Navigation
  description: Verifies that Base Panel Navigation works as expected in the Navigation section. The test
    passes when the Base page is displayed; the Base page is marked as active; Base nav pill is visually
    highlighted.
  steps:
  - Navigate away to the VLA or Analytics panel
  - Click the 'Base' nav pill in the LeftRail
  - Check QStackedWidget.currentIndex()
  - Verify the Base pill has the active/highlighted visual state
  expected_result: 'QStackedWidget current index is 0; base_bridge.base_active_section == ''base''; Base
    nav pill is visually highlighted.

    '
  fail_conditions: 'Stack index is not 0; active_section property does not update; pill highlight does
    not change.

    '
  priority: P0
  severity: Critical
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: 'MainWindow._on_nav(''base'') sets all three bridge *_active_section properties to ''base''
    then calls setCurrentIndex(0).

    '
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-215
  next_action_if_fail: Check MainWindow._on_nav wiring; inspect LeftRail signal emission.
