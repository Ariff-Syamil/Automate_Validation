- test_case_id: TC-GUI-031
  owner: GUI Automation Team
  component: Base Panel / KPI Strip
  dependency:
  - TC-GUI-020
  precondition: 'System is RUNNING; mock_data.enabled: true.'
  test_name: KPI RPM Aggregation
  description: Verifies that KPI RPM Aggregation works as expected in the Base Panel and KPI Strip section.
    The test passes when the total RPM display shows the sum of individual motor card RPM gauge values
    (within rounding tolerance of ±1 RPM).
  steps:
  - Start the system (Play)
  - Wait 1000 ms for mock data to populate motor gauges
  - Sum the RPM values shown on all visible motor cards
  - Read totalRpm from the KPI strip
  expected_result: 'KPI totalRpm equals the sum of individual motor card RPM gauge values (within rounding
    tolerance of ±1 RPM).

    '
  fail_conditions: KPI totalRpm does not match sum of motor card values; shows 0.
  priority: P1
  severity: Major
  automation_readiness: Semi-Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: 'KpiStrip.totalRpm is computed from base_transport_playing and per-card values in QML,
    not the bridge directly.

    '
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-219
  next_action_if_fail: 'Inspect KpiStrip QML binding for totalRpm; verify motor card RPM properties are
    updated by bridge.base_update_motor().

    '
- test_case_id: TC-GUI-032
