# =============================================================================
# Automate 5 - Multi Axis Motor Control FPGA Validation Test Cases
# =============================================================================

test_cases:
  - test_id: "MAMC-001"
    title: "Motor control FPGA bitstream load"
    subcomponent: "multi_axis_motor_control_fpga"
    description: |
      Verify that the Multi Axis Motor Control FPGA loads its bitstream
      and initializes all motor control channels.
    dependencies: []
    test_steps:
      - step_number: 1
        action: "Power on the motor control FPGA board"
        expected_result: "FPGA configuration completes (DONE asserted)"
      - step_number: 2
        action: "Read FPGA identification and version registers"
        expected_result: "Correct FPGA ID and expected firmware version"
      - step_number: 3
        action: "Verify all motor control channels report idle state"
        expected_result: "All channels in idle/safe state with no faults"
    success_criteria: "FPGA configures, reports correct version, all channels idle with no faults"
    failure_criteria: "Configuration failure, wrong version, or any channel reporting faults"
    executed: false
    result: null
    execution_date: null
    executed_by: null
    notes: ""

  - test_id: "MAMC-002"
    title: "Single axis motor control loop"
    subcomponent: "multi_axis_motor_control_fpga"
    description: |
      Validate closed-loop motor control on a single axis with
      position and velocity feedback.
    dependencies:
      - "MAMC-001"
    test_steps:
      - step_number: 1
        action: "Enable single motor axis with test PID parameters"
        expected_result: "Axis enables without fault"
      - step_number: 2
        action: "Command a position move and monitor feedback"
        expected_result: "Motor reaches target position within tolerance"
      - step_number: 3
        action: "Command a velocity profile and verify tracking"
        expected_result: "Velocity follows commanded profile within tolerance"
      - step_number: 4
        action: "Disable axis and verify safe shutdown"
        expected_result: "Axis returns to idle state, motor de-energized"
    success_criteria: "Position accuracy within ±0.1mm, velocity tracking within ±1%, clean shutdown"
    failure_criteria: "Position error > tolerance, velocity tracking error > tolerance, or fault on disable"
    executed: false
    result: null
    execution_date: null
    executed_by: null
    notes: ""

  - test_id: "MAMC-003"
    title: "Multi axis coordinated motion"
    subcomponent: "multi_axis_motor_control_fpga"
    description: |
      Validate coordinated multi-axis motion with synchronized
      position commands across all axes.
    dependencies:
      - "MAMC-001"
      - "MAMC-002"
    test_steps:
      - step_number: 1
        action: "Enable all motor axes"
        expected_result: "All axes enabled without faults"
      - step_number: 2
        action: "Command coordinated multi-axis move"
        expected_result: "All axes begin and end motion simultaneously"
      - step_number: 3
        action: "Verify inter-axis synchronization"
        expected_result: "Axis sync error within specification"
      - step_number: 4
        action: "Verify final positions on all axes"
        expected_result: "All axes at target position within tolerance"
    success_criteria: "All axes reach target within tolerance with inter-axis sync error < 10μs"
    failure_criteria: "Any axis out of position tolerance or sync error exceeds 10μs"
    executed: false
    result: null
    execution_date: null
    executed_by: null
    notes: ""

  - test_id: "MAMC-004"
    title: "Motor control safety and fault handling"
    subcomponent: "multi_axis_motor_control_fpga"
    description: |
      Verify that the motor control FPGA handles fault conditions
      safely, including emergency stop and overcurrent protection.
    dependencies:
      - "MAMC-001"
      - "MAMC-002"
    test_steps:
      - step_number: 1
        action: "Enable a motor axis and begin motion"
        expected_result: "Axis moving under normal control"
      - step_number: 2
        action: "Trigger emergency stop input"
        expected_result: "All axes immediately de-energize"
      - step_number: 3
        action: "Verify fault registers capture the e-stop event"
        expected_result: "E-stop fault code logged with timestamp"
      - step_number: 4
        action: "Clear fault and verify system can be re-enabled"
        expected_result: "Faults cleared, axes can re-enable"
    success_criteria: "E-stop disables all axes within 1ms, fault logged, system recoverable"
    failure_criteria: "Any axis continues moving after e-stop, fault not logged, or system unrecoverable"
    executed: false
    result: null
    execution_date: null
    executed_by: null
    notes: ""
