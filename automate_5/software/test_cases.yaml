test_cases:
- test_case_id: TC-SW-001
  owner: Kin Nam / Haikal
  component: UDP Communication
  dependency:
  - TC-FPGA-003
  - TC-FPGA-004
  precondition: 10G/25G FPGA Ethernet dependencies are available; host UDP listener port is open; packet
    format is agreed with FPGA sender.
  test_name: UDP Packet Round Trip
  description: Checks the UDP Communication area in simple terms. A pass means Every transmitted UDP packet
    is received once, with intact payload bytes, expected sequence order, and no malformed length or checksum
    indicators.
  steps:
  - Start the host UDP listener on the configured validation port.
  - Transmit a known payload from the FPGA sender through the validated Ethernet path.
  - Capture the received packet bytes and metadata on the host.
  - Compare payload, sequence number, and length against the expected packet contract.
  - Repeat for a short burst to verify no drops under nominal rate.
  expected_result: Every transmitted UDP packet is received once, with intact payload bytes, expected
    sequence order, and no malformed length or checksum indicators.
  fail_conditions: Any packet is lost, duplicated, malformed, received out of order, or rejected by the
    host listener.
  priority: P1
  severity: Major
  automation_readiness: Automatable
  automation_status: In Progress
  test_environment_ci_hil: CI
  observations: Foundation networking test for host-to-FPGA packet exchange after Ethernet link validation.
  jira_link: null
  next_action_if_fail: Check FPGA sender counters, host MTU, socket buffers, firewall rules, and packet
    capture for loss or corruption.
- test_case_id: TC-SW-002
  owner: Kin Nam / Haikal
  component: CAN-FD Protocol
  dependency: null
  precondition: CAN-FD encode/decode library is installed; representative DBC or frame definition is available
    for validation.
  test_name: CAN-FD Frame Round Trip
  description: Checks the CAN-FD Protocol area in simple terms. A pass means Valid frames round-trip with
    matching identifier, DLC, flags, and payload values; invalid frames fail deterministically without
    corrupting state.
  steps:
  - Build representative CAN-FD frames covering nominal motor command, boundary payload length, and invalid
    field cases.
  - Encode each frame using the software protocol helper.
  - Transmit or loop back the encoded frame through the available CAN-FD validation path.
  - Decode the received bytes and compare identifier, DLC, flags, and payload fields.
  - Verify invalid frames are rejected with a clear error.
  expected_result: Valid frames round-trip with matching identifier, DLC, flags, and payload values; invalid
    frames fail deterministically without corrupting state.
  fail_conditions: Frame fields mismatch after decode, invalid data is accepted, payload length is wrong,
    or transmission rejects a valid frame.
  priority: P1
  severity: Major
  automation_readiness: Automatable
  automation_status: In Progress
  test_environment_ci_hil: CI
  observations: Protocol validation for motor-control messaging before HIL bus integration.
  jira_link: null
  next_action_if_fail: Validate bit timing, DBC/frame definitions, endian handling, and encode/decode
    boundary checks.
- test_case_id: TC-SW-003
  owner: Sheng Li
  component: EtherCAT Stack
  dependency:
  - TC-FPGA-003
  - TC-FPGA-004
  - TC-FPGA-005
  - TC-SW-001
  precondition: EtherCAT master runtime is installed; FPGA Ethernet path and UDP packet exchange dependencies
    have passed; target slave is reachable.
  test_name: EtherCAT PDO Cycle
  description: Checks the EtherCAT Stack area in simple terms. A pass means Expected slave is discovered,
    reaches operational state, exchanges PDO data cyclically within jitter tolerance, and shuts down cleanly.
  steps:
  - Start the EtherCAT master runtime with the target network interface selected.
  - Discover the expected slave device and confirm it reaches the operational state.
  - Run cyclic PDO exchange for the configured validation duration.
  - Record cycle time, jitter, missed frames, and process-data values.
  - Stop the master cleanly and confirm the slave returns to a safe state.
  expected_result: Expected slave is discovered, reaches operational state, exchanges PDO data cyclically
    within jitter tolerance, and shuts down cleanly.
  fail_conditions: Slave is not discovered, state transition fails, PDO values mismatch, jitter exceeds
    tolerance, frames are missed, or shutdown leaves an unsafe state.
  priority: P0
  severity: Critical
  automation_readiness: Semi-Automatable
  automation_status: In Progress
  test_environment_ci_hil: HIL
  observations: Core HIL motion-control communication path; depends on stable Ethernet and UDP packet
    exchange.
  jira_link: null
  next_action_if_fail: Inspect EtherCAT state machine transitions, distributed-clock sync, NIC binding,
    and slave diagnostics.
- test_case_id: TC-SYS-001
  owner: Ji Lik / Ariff
  component: End-to-End System
  dependency:
  - TC-FPGA-001
  - TC-FPGA-002
  - TC-FPGA-003
  - TC-FPGA-004
  - TC-FPGA-005
  - TC-FPGA-006
  - TC-SW-001
  - TC-SW-002
  - TC-SW-003
  - TC-VLA-001
  - TC-VLA-002
  precondition: All listed FPGA, software, and VLA prerequisite tests have passed in the current HIL configuration.
  test_name: End-to-End System Flow
  description: Checks the End-to-End System area in simple terms. A pass means Vision input, action generation,
    command transport, and motor actuation complete the scenario within latency tolerance with no dropped
    commands or subsystem faults.
  steps:
  - Confirm all listed FPGA, software, and VLA prerequisite cases have passed in the same bench configuration.
  - Start the live vision pipeline and verify image stream health.
  - Issue a representative gesture or policy action through the VLA/control-loop path.
  - Observe command transport through software networking and motor-control layers.
  - Verify motor actuation matches the commanded action and record end-to-end latency.
  expected_result: Vision input, action generation, command transport, and motor actuation complete the
    scenario within latency tolerance with no dropped commands or subsystem faults.
  fail_conditions: Any prerequisite subsystem regresses, action data is dropped or malformed, motor response
    is incorrect, latency exceeds tolerance, or a safety fault occurs.
  priority: P0
  severity: Critical
  automation_readiness: Manual
  automation_status: In Progress
  test_environment_ci_hil: HIL
  observations: Final HIL acceptance gate tying together FPGA capture, software transport, VLA action
    generation, and mechanical actuation.
  jira_link: null
  next_action_if_fail: Use prerequisite results and logs to isolate the first failing subsystem, then
    rerun the relevant lower-level case before repeating E2E validation.
