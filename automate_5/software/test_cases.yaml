- test_case_id: TC-SW-004
  owner: Automate5 QA
  component: Packet Layer
  dependency:
  - TC-SW-001
  precondition: Automate5 source checkout and declared test dependencies available.
  test_name: UDP header binary round-trip and bounds validation
  steps:
  - Create UdpHeader values
  - Pack to bytes
  - Unpack and compare fields
  - Assert invalid lengths and buffers fail
  expected_result: Packed header is 8 bytes; round-trip fields match; invalid values are rejected.
  fail_conditions: Wrong byte order/length, mismatch, or silent acceptance of invalid data.
  priority: P0
  severity: Critical
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: CI
  observations: Covers automate5/packets/udp_header.py.
  jira_link: null
