- test_case_id: TC-VLA-003
  owner: Automate5 QA
  component: Gesture Recognition
  dependency:
  - TC-VLA-001
  precondition: MediaPipe hand_landmarker.task exists; left/right gesture videos are available.
  test_name: Offline gesture videos satisfy left-hand selection and right-hand speed/stop acceptance
  steps:
  - Load detector settings and fixture scenarios
  - Run MediaPipe over left-hand fixture video
  - Verify selections 1, 2, 3, 4, and ALL
  - Run right-hand fixture video
  - Verify speed below threshold, speed above threshold, and fist stop
  expected_result: All must_observe gestures are detected before video end; missing assets skip rather
    than fail CI.
  fail_conditions: Required gesture never appears, detector fails to load, or fixture path is wrong when
    assets are expected.
  priority: P1
  severity: Major
  automation_readiness: Automatable
  automation_status: Ready
  test_environment_ci_hil: HIL
  observations: Derived from tests/test_suite_gesture/testcase_gesture.py; skip_in_ci remains true because
    video/model assets are required.
  jira_link: null
  next_action_if_fail: Inspect the VLA, Hololink, gesture, and hardware setup referenced by this case.
- test_case_id: TC-VLA-004
  owner: Automate5 QA
  component: Hololink Camera Pipeline
  dependency:
  - TC-FPGA-001
  - TC-FPGA-003
  - TC-SW-020
  precondition: Hololink board reachable at configured IP; camera sensor connected; display or video sink
    available.
  test_name: Hololink single-camera configure success emits live state and frames
  steps:
  - Register QVideoSink for CAM1
  - Call apply_preview in single-camera mode
  - Wait for live signal and frame delivery
  - Verify no last_error and shutdown clears live state
  expected_result: CAM1 becomes live, frames arrive, no configure error is recorded, and shutdown is clean.
  fail_conditions: Board not discovered, no live signal, no frames, configure error emitted, or shutdown
    leaks worker state.
  priority: P0
  severity: Critical
  automation_readiness: Semi-Automatable
  automation_status: In Progress
  test_environment_ci_hil: HIL
  observations: Optional hardware success-path counterpart to CI negative-path tests.
  jira_link: null
  next_action_if_fail: Inspect the VLA, Hololink, gesture, and hardware setup referenced by this case.
- test_case_id: TC-VLA-005
  owner: Automate5 QA
  component: Hololink Camera Pipeline
  dependency:
  - TC-VLA-004
  precondition: Two cameras/sensors available through Hololink and configured for dual preview.
  test_name: Hololink dual-camera mode reports both previews live
  steps:
  - Register CAM1 and CAM2 video sinks
  - Configure dual-camera mode
  - Wait for both live signals and frame delivery
  - Verify shutdown clears both live states
  expected_result: Both camera slots become live, emit frames, and cleanly stop.
  fail_conditions: Only one slot becomes live, sinks receive no frames, dual-mode configure fails, or
    cleanup leaves live state active.
  priority: P1
  severity: Major
  automation_readiness: Semi-Automatable
  automation_status: In Progress
  test_environment_ci_hil: HIL
  observations: Covers dual preview behavior used by Base and VLA GUI panels.
  jira_link: null
  next_action_if_fail: Inspect the VLA, Hololink, gesture, and hardware setup referenced by this case.
- test_case_id: TC-VLA-006
  owner: Automate5 QA
  component: VLA Policy Server
  dependency:
  - TC-SYS-003
  precondition: VLA policy server or simulator reachable; synthetic observation fixture available.
  test_name: VLA policy server returns valid action chunk for synthetic observation
  steps:
  - Connect to configured VLA policy endpoint
  - Send synthetic observation and prompt
  - Receive action chunk response
  - Validate shape, numeric ranges, timeout behavior, and motor command conversion
  expected_result: Policy service returns valid action within timeout and failure paths map to coded errors.
  fail_conditions: Timeout, malformed action, invalid range, missing prompt handling, or no coded error
    on failure.
  priority: P0
  severity: Critical
  automation_readiness: Semi-Automatable
  automation_status: In Progress
  test_environment_ci_hil: HIL
  observations: Bridges mocked control-loop contract tests to real VLA service validation.
  jira_link: null
  next_action_if_fail: Inspect the VLA, Hololink, gesture, and hardware setup referenced by this case.
