- test_case_id: TC-FPGA-007
  owner: Seow Jie / Sheng Li
  component: Ethernet RX / SGDMA (25G Optimization)
  dependency:
  - TC-FPGA-004
  - TC-FPGA-005
  precondition: 25G link established (TC-FPGA-004 passed); real motor/sensor traffic source available
    (not synthetic test patterns); torn-rate counters instrumented in RTL/firmware.
  test_name: 25G Sustained Torn-Rate Soak Test
  description: Checks that the ingress datapath sustains full 25G line rate with MTU-sized real
    application traffic over an extended run without torn (dropped/corrupted) packets.
  steps:
  - Confirm 25G link is up and stable (TC-FPGA-004 passed).
  - Replace synthetic test-pattern generator with real motor/sensor application traffic.
  - Drive sustained, MTU-sized traffic at full 25G line rate for the soak duration.
  - Monitor SGDMA descriptor completion, buffer occupancy, and torn/dropped packet counters throughout.
  - Confirm measured sustained bandwidth against target and record final torn-rate count.
  expected_result: Torn-rate counter stays at zero (or within agreed tolerance) for the full soak
    duration, sustained bandwidth meets target, and no descriptor completion errors occur.
  fail_conditions: Torn/dropped packets accumulate, sustained bandwidth falls below target, buffers
    overflow/underrun, or descriptor completions stall or error out.
  priority: P0
  severity: Critical
  automation_readiness: Semi-Automatable
  automation_status: Not Ready
  test_environment_ci_hil: HIL
  observations: Direct acceptance test for DSSOL-298 (Optimize Ingress Path). Blocked until DSSOL-229
    egress live-streaming verification completes.
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-298
  next_action_if_fail: Profile SGDMA buffer depth, drain timing, and completion-handling logic in the
    custom RTL; compare against 10G baseline torn-rate counters.
- test_case_id: TC-VLA-007
  owner: Seow Jie Tan
  component: Holoscan Sensor Bridge Demo Container
  dependency:
  - TC-FPGA-004
  - TC-VLA-001
  precondition: 25G link established; Holoscan Sensor Bridge Demo Container image built and deployed
    on Jetson AGX Thor.
  test_name: Holoscan Demo Container Live Stream Verification
  description: Checks that the Holoscan Sensor Bridge Demo Container builds successfully and displays
    a live camera stream end-to-end over the 25G link.
  steps:
  - Build the Holoscan Sensor Bridge Demo Container image against the current reference design.
  - Deploy and launch the container on the flashed Jetson AGX Thor.
  - Confirm the container connects to the FPGA over the 25G Ethernet link.
  - Verify live video renders in the demo viewer with expected frame rate.
  - Run for the validation interval and check for stalls, disconnects, or container crashes.
  expected_result: Container builds without errors, connects over 25G, and displays a stable live
    stream for the full validation interval with no crashes or disconnects.
  fail_conditions: Container fails to build, fails to connect over 25G, stream does not render, stalls,
    or the container crashes during the run.
  priority: P0
  severity: Critical
  automation_readiness: Manual
  automation_status: Not Ready
  test_environment_ci_hil: HIL
  observations: Direct acceptance test for the two open WW27 action items on DSSOL-229 ("Building the
    Holoscan Sensor Bridge Demo Container" and "Live streaming verification").
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-229
  next_action_if_fail: Check container build logs, Thor-to-FPGA network reachability, and Hololink
    camera pipeline health (see TC-VLA-004/005).
- test_case_id: TC-FPGA-008
  owner: Seow Jie Tan
  component: MIPI Camera Input (Fault Detection)
  dependency:
  - TC-FPGA-001
  precondition: Camera module under test connected to a validated AvantX camera slot.
  test_name: Camera Module I2C Bus-Scan Regression
  description: Checks that a camera module responds correctly to an I2C bus-id scan, guarding against
    a repeat of the SF5X258 hardware-fault failure mode.
  steps:
  - Connect the camera module under test to a known-good AvantX camera slot.
  - Run an I2C bus-id scan against the expected camera address.
  - Confirm the camera responds and reports its expected device ID.
  - Repeat on the second camera slot to rule out slot-specific faults.
  - Record pass/fail per camera unit serial number for traceability.
  expected_result: Camera responds to the I2C bus-id scan with the correct device ID on both camera
    slots.
  fail_conditions: I2C scan times out, wrong device ID is returned, or camera fails on one slot but
    not the other (indicating a module-specific hardware fault).
  priority: P1
  severity: Major
  automation_readiness: Semi-Automatable
  automation_status: Not Ready
  test_environment_ci_hil: HIL
  observations: Added after root-causing the non-functional SF5X258 unit to a hardware fault (DSSOL-229,
    WW22-WW24). Intended as an incoming-inspection gate for future camera batches.
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-229
  next_action_if_fail: Quarantine the camera unit, request a replacement from the CH team, and log the
    failing serial number.
- test_case_id: TC-FPGA-009
  owner: Seow Jie Tan
  component: MIPI Camera Input (Image Quality)
  dependency:
  - TC-FPGA-002
  precondition: Dual-camera capture passes (TC-FPGA-002); focus/calibration tooling available with an
    objective sharpness metric.
  test_name: Dual-Camera Focus & Sharpness Calibration
  description: Checks that both camera streams meet an objective sharpness threshold after focus
    tuning, replacing the current subjective "looks clear" assessment.
  steps:
  - Enable dual-camera stereo mode with both streams live.
  - Capture a reference test-chart image on each stream.
  - Compute an objective sharpness/MTF score for each captured frame.
  - Compare each stream's score against the agreed minimum threshold.
  - Record per-camera scores for trend tracking across future calibration passes.
  expected_result: Both camera streams meet or exceed the minimum sharpness/MTF threshold with no
    visible blur.
  fail_conditions: Either stream's sharpness score falls below threshold, or visible blur persists
    after focus tuning.
  priority: P2
  severity: Minor
  automation_readiness: Semi-Automatable
  automation_status: Not Ready
  test_environment_ci_hil: HIL
  observations: Converts the open "image blur, ongoing calibration" note (DSSOL-229 WW24-WW26) into an
    objective, repeatable pass/fail gate.
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-229
  next_action_if_fail: Re-run focus tuning procedure, check lens seating and back-focus distance, and
    re-measure.
- test_case_id: TC-FPGA-010
  owner: Sheng Li / Kin Nam
  component: Ethernet RX / SGDMA (Robustness)
  dependency:
  - TC-FPGA-005
  - TC-FPGA-006
  precondition: TC-FPGA-005 and TC-FPGA-006 passed; THOR Python traffic generator and fabric-RTL pattern
    generator are both available on the same bitstream; SGDMA descriptor/memory readback harness is in
    place.
  test_name: Ingress UDP Payload Size Sweep
  description: Checks that SGDMA and firmware correctly capture and validate payloads across a sweep
    of UDP payload sizes, including boundary values around the AXIS tkeep width and MTU.
  steps:
  - Define the payload size sweep list, covering minimum payload, tkeep-width boundary values (width-1,
    width, width+1), a typical mid-size payload, and MTU-sized payload.
  - For each size, send a deterministic payload from the THOR Python script over UDP to the FPGA.
  - Repeat the same sweep using the fabric-RTL pattern generator with matching frame lengths.
  - For each transfer, have firmware read back the SGDMA buffer and compare byte-for-byte against the
    expected payload and length.
  - Record pass/fail per payload size and per source (THOR vs. pattern generator).
  expected_result: Every payload size in the sweep is captured with correct length and byte-exact content
    from both the THOR and pattern-generator sources, with no SGDMA descriptor or bus errors.
  fail_conditions: Any payload size is truncated, padded incorrectly, misaligned at a tkeep boundary,
    corrupted, or reports a descriptor/bus error.
  priority: P1
  severity: Major
  automation_readiness: Automatable
  automation_status: Not Ready
  test_environment_ci_hil: HIL
  observations: Formalizes the WW24'26 "sweep payload size" robustness item from the Bi-Weekly Updates
    page; builds directly on the TC-FPGA-005/006 dual-source proof.
  jira_link: https://latticesemi.atlassian.net/browse/DSSOL-298
  next_action_if_fail: Check tkeep/tlast handling at the failing size, the descriptor length field, and
    buffer alignment in the SGDMA RTL.
- test_case_id: TC-FPGA-011
  owner: Sheng Li
  component: Ethernet RX / SGDMA (Robustness)
  dependency:
  - TC-FPGA-005
  - TC-FPGA-006
  precondition: TC-FPGA-005 and TC-FPGA-006 passed; descriptor ring depth is known; THOR script supports
    configurable inter-frame gap and burst count.
  test_name: Back-to-Back Burst / Descriptor Ring Wraparound
  description: Checks that SGDMA correctly handles bursts of back-to-back frames at minimum inter-frame
    gap without dropping frames or corrupting the descriptor ring, including wraparound past the ring
    depth.
  steps:
  - Configure THOR to send bursts of N frames at minimum inter-frame gap, sweeping N across 1, a mid-size
    burst, and a burst exceeding the descriptor ring depth to force wraparound.
  - Trigger each burst and allow SGDMA to capture all frames into the configured descriptor ring.
  - Have firmware walk every completed descriptor and verify payload, length, and ordering for each frame
    in the burst.
