# =============================================================================
# Automate Validation - Test Case Template
# =============================================================================
# Field names mirror the column headers in Automate5_Test_Cases.xlsx
# (sheet 'Automate5_Test_Cases'), snake-cased.
#
# Test Case ID prefixes -> subcomponent folder:
#   TC-FPGA-NNN   -> automate_<v>/holoscan_fpga/test_cases.yaml
#   TC-VLA-NNN    -> automate_<v>/holoscan_fpga/test_cases.yaml
#   TC-SW-NNN     -> automate_<v>/software/test_cases.yaml
#   TC-SYS-NNN    -> automate_<v>/software/test_cases.yaml
#   TC-HW-NN      -> automate_<v>/mechanical/test_cases.yaml
#   TC-MAMC-NNN   -> automate_<v>/multi_axis_motor_control_fpga/test_cases.yaml
#
# Required: test_case_id, test_name. Everything else may be null.
# =============================================================================

- test_case_id: "TC-<PREFIX>-001"
  owner: "<Person or pair>"
  component: "<Functional area, e.g. MIPI Camera Input>"
  dependency:
    - "<TC-XXX-NNN>"
  precondition: "<Required setup or hardware state>"
  test_name: "<Short descriptive name>"
  description: "<Plain-language explanation for a non-expert user>"
  steps:
    - "<First action>"
    - "<Second action>"
    - "<Third action>"
  expected_result: "<What constitutes a passing test>"
  fail_conditions: "<What constitutes a failing test>"
  priority: "P1"                         # P0 / P1 / P2
  severity: "Major"                      # Critical / Major / Minor
  automation_readiness: "Automatable"    # Automatable / Semi-Automatable / Manual
  automation_status: "Not Ready"         # Ready / Not Ready / In Progress
  test_environment_ci_hil: "CI"          # CI / HIL
  observations: null
  jira_link: null
  next_action_if_fail: "<Triage / debug hint>"
